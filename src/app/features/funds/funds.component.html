<div class="w-full p-5 gap-5 flex flex-col space-y-8 lg:space-y-12">
  @if (userService.loading()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 backdrop-blur-xs animate-fade-in">
      <app-loading-spinner containerClass="p-0" />
    </div>
  }

  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6">
    <div>
      <h1 class="text-3xl lg:text-4xl font-bold text-white tracking-tight">Fondos Disponibles</h1>
      <p class="text-slate-400 text-sm mt-1.5">Explora y suscríbete a los fondos de inversión</p>
    </div>
    <div
      class="flex items-center gap-3 p-3! rounded-xl bg-slate-800/50 border border-slate-700/50 self-start hover:border-slate-600/50 transition-colors duration-200"
    >
      <span class="text-xs text-slate-500">Saldo:</span>
      <span class="text-sm font-bold text-emerald-400">
        {{ userService.balance() | copCurrency: false }}
      </span>
    </div>
  </div>

  <app-funds-summary></app-funds-summary>

  @defer (on idle) {
    <app-funds-list (subscribeFund)="openSubscribeDialog($event)" />
  } @placeholder {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
      @for (i of [1, 2, 3]; track i) {
        <div class="h-[280px] bg-slate-900/40 rounded-3xl border border-white/5 p-6 animate-pulse flex flex-col gap-4">
          <div class="flex justify-between items-start">
            <div class="w-12 h-12 rounded-2xl bg-white/5"></div>
            <div class="w-20 h-6 rounded-lg bg-white/5"></div>
          </div>
          <div class="h-8 w-3/4 rounded-lg bg-white/5 mt-2"></div>
          <div class="h-4 w-full rounded-lg bg-white/5 mt-1"></div>
          <div class="mt-auto flex justify-between gap-4">
            <div class="h-12 flex-1 rounded-2xl bg-white/5"></div>
            <div class="h-12 flex-1 rounded-2xl bg-white/10 border border-white/5"></div>
          </div>
        </div>
      }
    </div>
  }

  <app-action-dialog
    dialogType="subscribe"
    [visible]="!!selectedFund()"
    [fund]="selectedFund()"
    (closed)="closeSubscribeDialog()"
    (subscribed)="handleSubscribe($event)"
  />
</div>
