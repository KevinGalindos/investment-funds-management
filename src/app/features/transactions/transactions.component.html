<div class="flex flex-col gap-4 animate-fade-in">
  <!-- Header -->
  <div>
    <h1 class="text-3xl lg:text-4xl font-bold text-white tracking-tight">Historial de Transacciones</h1>
    <p class="text-slate-400 text-sm mt-2">Registro completo de suscripciones y cancelaciones</p>
  </div>

  <!-- Summary Statistics (Now Atomic Component) -->
  <app-transaction-summary />

  <!-- Filters Area (Now Atomic Component) -->
  <app-transaction-filters [activeFilter]="activeFilter()" (filterChange)="activeFilter.set($event)" />

  <!-- Multi-view Transaction List (Now Atomic Component) -->
  <app-transaction-list [transactions]="filteredTransactions()" />
</div>
