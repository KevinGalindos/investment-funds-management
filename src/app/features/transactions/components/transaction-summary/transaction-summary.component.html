<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
  <div
    class="stat-card bg-slate-900/50 border border-slate-800/50 rounded-xl flex items-center gap-3 transition-all duration-300 hover:border-slate-700/60 hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/5 cursor-default"
  >
    <div class="w-10 h-10 rounded-lg bg-indigo-500/15 flex items-center justify-center">
      <span class="text-lg">📋</span>
    </div>
    <div>
      <p class="text-xs text-slate-500">Total transacciones</p>
      <p class="text-xl font-bold text-white">
        {{ transactionService.transactions().length }}
      </p>
    </div>
  </div>
  <div
    class="stat-card bg-slate-900/50 border border-slate-800/50 rounded-xl flex items-center gap-3 transition-all duration-300 hover:border-emerald-500/30 hover:scale-[1.02] hover:shadow-lg hover:shadow-emerald-500/5 cursor-default"
  >
    <div class="w-10 h-10 rounded-lg bg-emerald-500/15 flex items-center justify-center">
      <span class="text-lg">📈</span>
    </div>
    <div>
      <p class="text-xs text-slate-500">Suscripciones</p>
      <p class="text-xl font-bold text-emerald-400">
        {{ transactionService.totalSubscriptions() }}
      </p>
    </div>
  </div>
  <div
    class="stat-card bg-slate-900/50 border border-slate-800/50 rounded-xl flex items-center gap-3 transition-all duration-300 hover:border-red-500/30 hover:scale-[1.02] hover:shadow-lg hover:shadow-red-500/5 cursor-default"
  >
    <div class="w-10 h-10 rounded-lg bg-red-500/15 flex items-center justify-center">
      <span class="text-lg">📉</span>
    </div>
    <div>
      <p class="text-xs text-slate-500">Cancelaciones</p>
      <p class="text-xl font-bold text-red-400">
        {{ transactionService.totalCancellations() }}
      </p>
    </div>
  </div>
</div>
