<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Gestión de Fondos de Inversión</title>
    <meta
      name="description"
      content="Plataforma de gestión de fondos de inversión. Suscríbete a fondos FPV y FIC, administra tu portafolio y consulta tu historial de transacciones."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    />
    <style>
      /* Critical CSS for instant first paint */
      :root { --bg-main: #020617; --font-main: 'Outfit', sans-serif; }
      body { 
        background-color: var(--bg-main); 
        color: #e2e8f0; 
        margin: 0; 
        font-family: var(--font-main);
        min-height: 100vh;
      }
      /* Prevent CLS for the main title area */
      h1 { min-height: 3rem; }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
  </head>

  </body>
</html>
